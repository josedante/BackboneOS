# Post-consolidation: single backend serves Django HTML CRM + DRF API (no separate Next.js service).
services:
  - type: web
    name: backend-${env}-${tenant}
    runtime: docker
    rootDir: backend
    dockerfilePath: Dockerfile.prod
    dockerCommand: ./entrypoint.sh
    plan: ${plan_backend}
    region: ${region}
    healthCheckPath: /health/
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: db-${tenant}
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: redis-${tenant}
          property: connectionString
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "backend-${env}-${tenant}.onrender.com,${custom_backend_domain}"
      - key: CORS_ALLOWED_ORIGINS
        value: "${app_origin}"
      - key: CSRF_TRUSTED_ORIGINS
        value: "${app_origin},https://backend-${env}-${tenant}.onrender.com"
      - key: SECRET_KEY
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: CELERY_BROKER_URL
        fromService:
          type: keyvalue
          name: redis-${tenant}
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: keyvalue
          name: redis-${tenant}
          property: connectionString

  - type: worker
    name: worker-${env}-${tenant}
    runtime: docker
    rootDir: backend
    dockerfilePath: Dockerfile.prod
    dockerCommand: celery -A backend worker -l info --concurrency=2
    plan: ${plan_workers}
    region: ${region}
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: db-${tenant}
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: redis-${tenant}
          property: connectionString
      - key: SECRET_KEY
        sync: false

  - type: worker
    name: beat-${env}-${tenant}
    runtime: docker
    rootDir: backend
    dockerfilePath: Dockerfile.prod
    dockerCommand: celery -A backend beat -l info
    plan: ${plan_workers}
    region: ${region}
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: db-${tenant}
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: redis-${tenant}
          property: connectionString
      - key: SECRET_KEY
        sync: false

  - type: keyvalue
    name: redis-${tenant}
    plan: ${redis_plan}

databases:
  - name: db-${tenant}
    databaseName: app_${tenant}
    user: app_${tenant}
    plan: ${db_plan}

envVarGroups:
  - name: env-${env}-${tenant}
    envVars:
      - key: SECRET_KEY
        sync: false
