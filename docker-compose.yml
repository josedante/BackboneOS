services:
  backend:
    build: ./backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
      - redis

  # frontend:
  #   build: ./frontend
  #   command: npm run dev
  #   volumes:
  #     - ./frontend:/app
  #     - /app/node_modules
  #   ports:
  #     - "3000:3000"
  #   environment:
  #     - NUXT_HOST=0.0.0.0
  #     - NUXT_PORT=3000
  #     - NUXT_PUBLIC_API_BASE=http://localhost:8000
  #     - NUXT_PRIVATE_API_BASE=https://backend
  #   depends_on:
  #     - backend

  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - ../redis_data:/data
    restart: unless-stopped
  db:
    image: postgres:14
    volumes:
      - ../postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: mydatabase
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
    ports:
      - "5432:5432"

volumes:
  redis_data:
  postgres_data:
