services:
  celery:
    build: ./backend
    command: celery -A backend worker -l info
    depends_on:
      - backend
      - redis
    volumes:
      - ./backend:/app
    env_file:
      - .env
    networks:
      - backboneos-network
  celery-beat:
    build: ./backend
    command: celery -A backend beat -l info
    depends_on:
      - backend
      - redis
    volumes:
      - ./backend:/app
    env_file:
      - .env
    networks:
      - backboneos-network
  flower:
    build: ./backend
    command: celery -A backend flower --port=5555
    ports:
      - "5555:5555"
    depends_on:
      - redis
      - backend
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - CORS_ALLOWED_ORIGINS=http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173,http://127.0.0.1:5173,https://backboneos-frontend.onrender.com,https://backend.proyecto-opensource.orb.local,https://frontend.proyecto-opensource.orb.local
    networks:
      - backboneos-network
  backend:
    build: ./backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
      - redis
    networks:
      - backboneos-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - NEXT_TELEMETRY_DISABLED=1
      - NUXT_PUBLIC_API_BASE=https://backend.proyecto-opensource.orb.local
      - NUXT_PRIVATE_API_BASE=https://backend
    depends_on:
      - backend
    networks:
      - backboneos-network

  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - ../redis_data:/data
    restart: unless-stopped
    networks:
      - backboneos-network
  db:
    image: postgres:14
    volumes:
      - ../postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: mydatabase
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
    ports:
      - "5432:5432"
    networks:
      - backboneos-network

volumes:
  redis_data:
  postgres_data:

networks:
  backboneos-network:
    name: backboneos-network
    driver: bridge
