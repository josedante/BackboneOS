# BackboneOS Render Blueprint
# Complete production deployment configuration for Django + Nuxt.js CRM ecosystem

previews:
  generation: automatic # Enable preview environments for testing

# Environment groups for shared configuration
envVarGroups:
  - name: backboneos-shared
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: backend.settings
      - key: NODE_ENV
        value: production
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: PYTHONDONTWRITEBYTECODE
        value: "1"

# PostgreSQL Database
databases:
  - name: backboneos-db
    databaseName: backboneos
    user: backboneos_user
    plan: free # Free tier for development, upgrade to basic-1gb+ for production
    ipAllowList: [] # Private network only

# Redis Key-Value Store
services:
  - type: keyvalue
    name: backboneos-redis
    plan: starter # Upgraded from free for production stability
    maxmemoryPolicy: allkeys-lru
    ipAllowList: [] # Private network only

  # Backend API Service (Django) - Runs migrations and serves API
  - type: web
    name: backboneos-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: Dockerfile.prod
    dockerCommand: ./entrypoint.sh
    plan: starter # Free tier for development
    region: oregon # Default region
    scaling:
      minInstances: 1
      maxInstances: 3
      targetCPUPercent: 70
    healthCheckPath: /health/
    autoDeploy: true
    # Ensure migrations run before service starts
    buildCommand: echo "Building backend with migration support..."
    envVars:
      # Database connection
      - key: DATABASE_URL
        fromDatabase:
          name: backboneos-db
          property: connectionString
      
      # Redis connection
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: backboneos-redis
          property: connectionString
      
      # Django settings
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "backboneos-backend.onrender.com"
      
      # Security (prompt for these in dashboard)
      - key: SECRET_KEY
        sync: false

      # CORS settings
      - key: CORS_ALLOWED_ORIGINS
        value: "https://backboneos-backend.onrender.com,https://backboneos-frontend.onrender.com,https://backboneos.com,https://thebackbonegroup.com"
      
      # Security headers and CSRF
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://backboneos-backend.onrender.com,https://backboneos-frontend.onrender.com,https://backboneos.com,https://thebackbonegroup.com"
      - key: SESSION_COOKIE_SECURE
        value: "True"
      - key: CSRF_COOKIE_SECURE
        value: "True"
      - key: SECURE_HSTS_SECONDS
        value: "31536000"
      - key: SECURE_HSTS_INCLUDE_SUBDOMAINS
        value: "True"
      - key: SECURE_HSTS_PRELOAD
        value: "True"
      - key: SECURE_SSL_REDIRECT
        value: "False"
      - key: SECURE_BROWSER_XSS_FILTER
        value: "True"
      - key: SECURE_CONTENT_TYPE_NOSNIFF
        value: "True"
      
      # Observability (prompt for these in dashboard)
      - key: SENTRY_DSN
        sync: false
      
      # Celery configuration
      - key: CELERY_BROKER_URL
        fromService:
          type: keyvalue
          name: backboneos-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: keyvalue
          name: backboneos-redis
          property: connectionString
      - key: CELERY_RESULT_EXPIRES
        value: "3600"  # 1 hour - prevents Redis memory issues
      - key: CELERY_TASK_ALWAYS_EAGER
        value: "False"
      - key: CELERY_TASK_EAGER_PROPAGATES
        value: "True"
      
      # Add shared environment variables
      - fromGroup: backboneos-shared

# Frontend Service (Next.js 15)
  - type: web
    name: backboneos-frontend
    runtime: docker
    rootDir: frontend
    dockerfilePath: Dockerfile
    plan: starter # Free tier for development
    region: oregon
    scaling:
      minInstances: 1
      maxInstances: 3
      targetCPUPercent: 70
    healthCheckPath: /
    autoDeploy: true
    envVars:
      # API configuration
      - key: NEXT_PUBLIC_API_BASE
        value: "https://backboneos-backend.onrender.com"
      
      # Next.js configuration
      - key: NODE_ENV
        value: "production"
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"
      - key: PORT
        value: "3000"
      
      # Build environment configuration
      - key: CI
        value: "true"
      
      # Add shared environment variables
      - fromGroup: backboneos-shared

# Celery Worker Service - Depends on backend for migrations
  - type: worker
    name: backboneos-celery-worker
    runtime: docker
    rootDir: backend
    dockerfilePath: Dockerfile.prod
    dockerCommand: celery -A backend worker -l info --concurrency=2
    plan: starter
    region: oregon
    envVars:
      # Database connection
      - key: DATABASE_URL
        fromDatabase:
          name: backboneos-db
          property: connectionString
      
      # Redis connection
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: backboneos-redis
          property: connectionString
      
      # Celery configuration
      - key: CELERY_BROKER_URL
        fromService:
          type: keyvalue
          name: backboneos-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: keyvalue
          name: backboneos-redis
          property: connectionString
      - key: CELERY_RESULT_EXPIRES
        value: "3600"  # 1 hour - prevents Redis memory issues
      - key: CELERY_TASK_ALWAYS_EAGER
        value: "False"
      - key: CELERY_TASK_EAGER_PROPAGATES
        value: "True"
      
      # Django settings
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "backboneos-backend.onrender.com"
      
      # Security (prompt for these in dashboard)
      - key: SECRET_KEY
        sync: false
      
      # Add shared environment variables
      - fromGroup: backboneos-shared

# Celery Beat Service (Scheduler) - Depends on backend for migrations
  - type: worker
    name: backboneos-celery-beat
    runtime: docker
    rootDir: backend
    dockerfilePath: Dockerfile.prod
    dockerCommand: celery -A backend beat -l info
    plan: starter
    region: oregon
    envVars:
      # Database connection
      - key: DATABASE_URL
        fromDatabase:
          name: backboneos-db
          property: connectionString
      
      # Redis connection
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: backboneos-redis
          property: connectionString
      
      # Celery configuration
      - key: CELERY_BROKER_URL
        fromService:
          type: keyvalue
          name: backboneos-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: keyvalue
          name: backboneos-redis
          property: connectionString
      - key: CELERY_RESULT_EXPIRES
        value: "3600"  # 1 hour - prevents Redis memory issues
      - key: CELERY_TASK_ALWAYS_EAGER
        value: "False"
      - key: CELERY_TASK_EAGER_PROPAGATES
        value: "True"
      
      # Django settings
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "backboneos-backend.onrender.com"
      
      # Security (prompt for these in dashboard)
      - key: SECRET_KEY
        sync: false
      
      # Add shared environment variables
      - fromGroup: backboneos-shared

# Flower Monitoring Service (Optional - for Celery monitoring)
# ⚠️  COST WARNING: This service costs ~$7/month on Starter Plan
# 🔒 SECURITY: This service is exposed publicly - consider IP restrictions
# You can delete this service to save costs if Celery monitoring is not needed
  - type: web
    name: backboneos-flower
    runtime: docker
    rootDir: backend
    dockerfilePath: Dockerfile.prod
    dockerCommand: celery -A backend flower --port=$PORT --basic_auth=$FLOWER_USER:$FLOWER_PASSWORD
    plan: starter
    region: oregon
    numInstances: 1
    healthCheckPath: /
    autoDeploy: true
    envVars:
      # Celery configuration
      - key: CELERY_BROKER_URL
        fromService:
          type: keyvalue
          name: backboneos-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: keyvalue
          name: backboneos-redis
          property: connectionString
      
      # Django settings
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "backboneos-flower.onrender.com"

      # Security (prompt for these in dashboard)
      - key: SECRET_KEY
        sync: false
      - key: FLOWER_USER
        sync: false
      - key: FLOWER_PASSWORD
        sync: false

      # Add shared environment variables
      - fromGroup: backboneos-shared
